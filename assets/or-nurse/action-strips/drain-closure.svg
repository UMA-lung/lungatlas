<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 145" width="860" height="145" font-family="sans-serif">
  <rect width="860" height="145" fill="#f5f7f5" rx="6"/>

  <!-- FRAME 1: 胸腔内を最終確認 -->
  <g transform="translate(10,10)">
    <rect width="105" height="110" rx="8" fill="#f0f7f2" stroke="#b8cfbb" stroke-width="1.5"/>
    <!-- empty chest cavity -->
    <path d="M24,78 Q18,56 28,38 Q40,22 52,20 Q64,22 76,38 Q86,56 80,78 Q68,88 52,90 Q36,88 24,78Z" fill="#eef8f0" stroke="#a0b8a0" stroke-width="1.5"/>
    <!-- lung re-expanded -->
    <path d="M30,72 Q26,56 36,46 Q52,38 68,46 Q78,56 74,72 Q64,82 52,84 Q40,82 30,72Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <!-- all-clear check mark -->
    <polyline points="30,56 42,68 68,44" fill="none" stroke="#1a7a4e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="11" cy="11" r="9" fill="#1a7a4e"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">1</text>
    <text x="52" y="101" text-anchor="middle" font-size="9" fill="#0d5c3a" font-weight="500">胸腔内を最終確認</text>
  </g>

  <!-- ARROW -->
  <polygon points="119,61 127,65 119,69" fill="#9aab9a"/>
  <line x1="115" y1="65" x2="119" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 2: ドレーンを準備 (BLUE) -->
  <g transform="translate(130,10)">
    <rect width="105" height="110" rx="8" fill="#eef4fb" stroke="#b0c8e0" stroke-width="1.5"/>
    <!-- drain tube coiled/ready -->
    <ellipse cx="52" cy="52" rx="28" ry="22" fill="none" stroke="#1a5fa0" stroke-width="3" stroke-dasharray="8,4"/>
    <rect x="46" y="20" width="12" height="36" rx="6" fill="#c8daf4" stroke="#1a5fa0" stroke-width="2"/>
    <!-- drain tip -->
    <ellipse cx="52" cy="20" rx="6" ry="4" fill="#1a5fa0"/>
    <!-- hole pattern on drain -->
    <circle cx="52" cy="28" r="2" fill="#1a5fa0"/>
    <circle cx="52" cy="36" r="2" fill="#1a5fa0"/>
    <circle cx="52" cy="44" r="2" fill="#1a5fa0"/>
    <circle cx="11" cy="11" r="9" fill="#1a5fa0"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">2</text>
    <text x="52" y="101" text-anchor="middle" font-size="10" fill="#0c3d6e" font-weight="500">ドレーンを準備</text>
  </g>

  <!-- ARROW -->
  <polygon points="239,61 247,65 239,69" fill="#9aab9a"/>
  <line x1="235" y1="65" x2="239" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 3: ドレーンを挿入 (BLUE) -->
  <g transform="translate(250,10)">
    <rect width="105" height="110" rx="8" fill="#eef4fb" stroke="#b0c8e0" stroke-width="1.5"/>
    <!-- chest wall edge -->
    <line x1="20" y1="20" x2="20" y2="90" stroke="#c8b890" stroke-width="5" stroke-linecap="round"/>
    <!-- drain going through chest wall -->
    <rect x="14" y="44" width="60" height="10" rx="5" fill="#c8daf4" stroke="#1a5fa0" stroke-width="2"/>
    <!-- drain in chest, going down -->
    <line x1="74" y1="49" x2="74" y2="80" stroke="#1a5fa0" stroke-width="3" stroke-linecap="round"/>
    <!-- insertion arrow -->
    <polygon points="66,52 76,48 76,56" fill="#1a5fa0"/>
    <circle cx="11" cy="11" r="9" fill="#1a5fa0"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">3</text>
    <text x="52" y="101" text-anchor="middle" font-size="10" fill="#0c3d6e" font-weight="500">ドレーンを挿入</text>
  </g>

  <!-- ARROW -->
  <polygon points="359,61 367,65 359,69" fill="#9aab9a"/>
  <line x1="355" y1="65" x2="359" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 4: 位置確認 -->
  <g transform="translate(370,10)">
    <rect width="105" height="110" rx="8" fill="#f0f7f2" stroke="#b8cfbb" stroke-width="1.5"/>
    <!-- lung outline with drain in place -->
    <path d="M26,70 Q22,52 34,42 Q52,34 70,42 Q82,52 78,70 Q66,82 52,85 Q38,82 26,70Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <!-- drain inside chest -->
    <line x1="14" y1="50" x2="60" y2="50" stroke="#1a5fa0" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="50" x2="60" y2="80" stroke="#1a5fa0" stroke-width="3" stroke-linecap="round"/>
    <!-- apex position marker -->
    <circle cx="60" cy="44" r="4" fill="#1a5fa0" opacity="0.5"/>
    <!-- check mark -->
    <polyline points="28,64 38,72 58,56" fill="none" stroke="#1a7a4e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="11" cy="11" r="9" fill="#1a7a4e"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">4</text>
    <text x="52" y="101" text-anchor="middle" font-size="10" fill="#0d5c3a" font-weight="500">位置確認</text>
  </g>

  <!-- ARROW -->
  <polygon points="479,61 487,65 479,69" fill="#9aab9a"/>
  <line x1="475" y1="65" x2="479" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 5: 固定糸を準備 (GREEN) -->
  <g transform="translate(490,10)">
    <rect width="105" height="110" rx="8" fill="#f0f7f2" stroke="#b8cfbb" stroke-width="1.5"/>
    <!-- skin surface -->
    <line x1="14" y1="58" x2="90" y2="58" stroke="#f0d0a0" stroke-width="6" stroke-linecap="round"/>
    <!-- drain going through skin -->
    <rect x="44" y="30" width="10" height="36" rx="4" fill="#c8daf4" stroke="#1a5fa0" stroke-width="2"/>
    <!-- suture through skin around drain (green) -->
    <path d="M28,56 Q38,48 44,58" fill="none" stroke="#1a7a4e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M60,58 Q66,48 76,56" fill="none" stroke="#1a7a4e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- suture tails -->
    <line x1="28" y1="56" x2="22" y2="44" stroke="#1a7a4e" stroke-width="2" stroke-linecap="round"/>
    <line x1="76" y1="56" x2="82" y2="44" stroke="#1a7a4e" stroke-width="2" stroke-linecap="round"/>
    <circle cx="11" cy="11" r="9" fill="#1a7a4e"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">5</text>
    <text x="52" y="101" text-anchor="middle" font-size="9.5" fill="#0d5c3a" font-weight="500">固定糸を準備</text>
  </g>

  <!-- ARROW -->
  <polygon points="599,61 607,65 599,69" fill="#9aab9a"/>
  <line x1="595" y1="65" x2="599" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 6: カウント確認 -->
  <g transform="translate(610,10)">
    <rect width="105" height="110" rx="8" fill="#f0f7f2" stroke="#b8cfbb" stroke-width="1.5"/>
    <!-- count board / list -->
    <rect x="22" y="24" width="60" height="58" rx="4" fill="white" stroke="#a0b0a0" stroke-width="1.5"/>
    <line x1="28" y1="36" x2="76" y2="36" stroke="#d4e0d6" stroke-width="1"/>
    <line x1="28" y1="46" x2="76" y2="46" stroke="#d4e0d6" stroke-width="1"/>
    <line x1="28" y1="56" x2="76" y2="56" stroke="#d4e0d6" stroke-width="1"/>
    <text x="52" y="34" text-anchor="middle" font-size="8" fill="#3d5042">ガーゼ</text>
    <text x="52" y="44" text-anchor="middle" font-size="8" fill="#3d5042">針</text>
    <text x="52" y="54" text-anchor="middle" font-size="8" fill="#3d5042">器械</text>
    <!-- check marks -->
    <text x="72" y="34" text-anchor="middle" font-size="10" fill="#1a7a4e">✓</text>
    <text x="72" y="44" text-anchor="middle" font-size="10" fill="#1a7a4e">✓</text>
    <text x="72" y="54" text-anchor="middle" font-size="10" fill="#1a7a4e">✓</text>
    <text x="52" y="70" text-anchor="middle" font-size="8" fill="#0d5c3a" font-weight="600">カウント一致</text>
    <circle cx="11" cy="11" r="9" fill="#1a7a4e"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">6</text>
    <text x="52" y="101" text-anchor="middle" font-size="9.5" fill="#0d5c3a" font-weight="500">カウント確認</text>
  </g>

  <!-- ARROW -->
  <polygon points="719,61 727,65 719,69" fill="#9aab9a"/>
  <line x1="715" y1="65" x2="719" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 7: ドレッシング -->
  <g transform="translate(730,10)">
    <rect width="105" height="110" rx="8" fill="#f4f5f4" stroke="#c8d0c8" stroke-width="1.5"/>
    <!-- skin surface -->
    <line x1="14" y1="60" x2="90" y2="60" stroke="#f0d0a0" stroke-width="6" stroke-linecap="round"/>
    <!-- drain tube -->
    <rect x="46" y="30" width="10" height="32" rx="4" fill="#c8daf4" stroke="#1a5fa0" stroke-width="1.5"/>
    <!-- dressing over wound -->
    <rect x="20" y="50" width="64" height="26" rx="4" fill="white" stroke="#9090a0" stroke-width="1.5"/>
    <!-- dressing texture -->
    <line x1="26" y1="58" x2="78" y2="58" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="26" y1="64" x2="78" y2="64" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="26" y1="70" x2="78" y2="70" stroke="#e0e0e0" stroke-width="1"/>
    <!-- tape edges -->
    <rect x="18" y="50" width="6" height="26" rx="2" fill="#e0c880" stroke="#c8a830" stroke-width="1"/>
    <rect x="80" y="50" width="6" height="26" rx="2" fill="#e0c880" stroke="#c8a830" stroke-width="1"/>
    <circle cx="11" cy="11" r="9" fill="#5a6a78"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">7</text>
    <text x="52" y="101" text-anchor="middle" font-size="10" fill="#3d5042" font-weight="500">ドレッシング</text>
  </g>
</svg>
