    <ellipse cx="52" cy="62" rx="26" ry="10" fill="#fce8e8" stroke="#c87070" stroke-width="1.5"/>
    <circle cx="26" cy="62" r="7" fill="#e4f0e8" stroke="#1a7a4e" stroke-width="1.5"/>
    <circle cx="78" cy="62" r="7" fill="#e4f0e8" stroke="#1a7a4e" stroke-width="1.5"/>
    <line x1="40" y1="24" x2="52" y2="52" stroke="#d97a00" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="24" x2="52" y2="52" stroke="#d97a00" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="36" x2="62" y2="36" stroke="#d97a00" stroke-width="2" stroke-linecap="round"/>
    <circle cx="11" cy="11" r="9" fill="#d97a00"/>
