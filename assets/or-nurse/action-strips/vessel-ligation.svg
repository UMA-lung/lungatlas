  <g transform="translate(730,10)">
    <rect width="105" height="110" rx="8" fill="#f4f0fc" stroke="#c8bef0" stroke-width="1.5"/>
    <line x1="30" y1="26" x2="66" y2="62" stroke="#6b52d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="66" y1="26" x2="30" y2="62" stroke="#6b52d4" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="26" cy="23" r="4.5" fill="none" stroke="#6b52d4" stroke-width="2"/>
    <circle cx="70" cy="23" r="4.5" fill="none" stroke="#6b52d4" stroke-width="2"/>
    <line x1="48" y1="58" x2="48" y2="76" stroke="#1a7a4e" stroke-width="2" stroke-dasharray="3,2"/>
    <rect x="34" y="77" width="30" height="16" rx="3" fill="#e8e8e8" stroke="#9090a0" stroke-width="1"/>
    <text x="49" y="89" text-anchor="middle" font-size="9" fill="#6b8070">回収</text>
