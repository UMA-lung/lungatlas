    <ellipse cx="52" cy="50" rx="26" ry="10" fill="#fce8e8" stroke="#c87070" stroke-width="1.5"/>
    <path d="M16,44 Q52,72 88,44" fill="none" stroke="#1a7a4e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="44" x2="8" y2="28" stroke="#1a7a4e" stroke-width="2" stroke-linecap="round"/>
    <line x1="88" y1="44" x2="96" y2="28" stroke="#1a7a4e" stroke-width="2" stroke-linecap="round"/>
    <circle cx="11" cy="11" r="9" fill="#1a7a4e"/>
