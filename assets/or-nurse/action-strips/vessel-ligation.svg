  <g transform="translate(370,10)">
    <rect width="105" height="110" rx="8" fill="#f0f7f2" stroke="#b8cfbb" stroke-width="1.5"/>
    <ellipse cx="52" cy="62" rx="26" ry="10" fill="#fce8e8" stroke="#c87070" stroke-width="1.5"/>
    <path d="M28,46 Q40,30 52,40 Q64,30 76,46" fill="none" stroke="#1a7a4e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M28,46 Q40,54 52,50 Q64,54 76,46" fill="none" stroke="#1a7a4e" stroke-width="2.5" stroke-linecap="round"/>
