    <ellipse cx="52" cy="50" rx="26" ry="10" fill="#fce8e8" stroke="#c87070" stroke-width="1.5"/>
    <path d="M16,44 Q52,74 88,44" fill="none" stroke="#7a8898" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="8" y="39" width="9" height="6" rx="3" fill="#7a8898"/>
    <circle cx="11" cy="11" r="9" fill="#5a6a78"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">2</text>
    <text x="52" y="101" text-anchor="middle" font-size="10" fill="#3d5042" font-weight="500">裏を通す</text>
  </g>

