  <g transform="translate(490,10)">
    <rect width="105" height="110" rx="8" fill="#f0f7f2" stroke="#b8cfbb" stroke-width="1.5"/>
    <ellipse cx="52" cy="80" rx="22" ry="9" fill="#fce8e8" stroke="#c87070" stroke-width="1.5"/>
    <rect x="46" y="22" width="12" height="42" rx="5" fill="#c8e6d8" stroke="#1a7a4e" stroke-width="1.5"/>
    <ellipse cx="52" cy="64" rx="9" ry="5" fill="#e4f0e8" stroke="#1a7a4e" stroke-width="1.5"/>
    <polygon points="48,16 56,16 52,23" fill="#1a7a4e"/>
    <circle cx="11" cy="11" r="9" fill="#1a7a4e"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">5</text>
