<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 145" width="860" height="145" font-family="sans-serif">
  <rect width="860" height="145" fill="#f5f7f5" rx="6"/>

  <!-- FRAME 1: 癒着範囲を見る -->
  <g transform="translate(10,10)">
    <rect width="105" height="110" rx="8" fill="#f4f5f4" stroke="#c8d0c8" stroke-width="1.5"/>
    <!-- lung outline -->
    <path d="M25,62 Q20,40 36,30 Q52,22 68,30 Q84,40 79,62 Q68,80 52,83 Q36,80 25,62Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <!-- adhesion bands (thick dark lines) -->
    <line x1="20" y1="58" x2="36" y2="50" stroke="#8b6060" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="68" x2="38" y2="62" stroke="#8b6060" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="24" y1="76" x2="36" y2="72" stroke="#8b6060" stroke-width="2" stroke-linecap="round"/>
    <!-- chest wall (left edge) -->
    <line x1="14" y1="28" x2="14" y2="90" stroke="#c8b890" stroke-width="4" stroke-linecap="round"/>
    <circle cx="11" cy="11" r="9" fill="#5a6a78"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">1</text>
    <text x="52" y="101" text-anchor="middle" font-size="9.5" fill="#3d5042" font-weight="500">癒着範囲を確認</text>
  </g>

  <!-- ARROW -->
  <polygon points="119,61 127,65 119,69" fill="#9aab9a"/>
  <line x1="115" y1="65" x2="119" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 2: 肺を愛護的に把持 -->
  <g transform="translate(130,10)">
    <rect width="105" height="110" rx="8" fill="#f4f5f4" stroke="#c8d0c8" stroke-width="1.5"/>
    <path d="M28,64 Q24,44 38,34 Q52,26 66,34 Q80,44 76,64 Q66,80 52,83 Q38,80 28,64Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <!-- gentle grasper -->
    <line x1="22" y1="30" x2="44" y2="50" stroke="#7a8898" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="34" x2="40" y2="54" stroke="#7a8898" stroke-width="2" stroke-linecap="round"/>
    <!-- gentle indicator (soft touch) -->
    <text x="70" y="38" font-size="9" fill="#7a8898">軽く</text>
    <circle cx="11" cy="11" r="9" fill="#5a6a78"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">2</text>
    <text x="52" y="101" text-anchor="middle" font-size="9" fill="#3d5042" font-weight="500">愛護的に把持</text>
  </g>

  <!-- ARROW -->
  <polygon points="239,61 247,65 239,69" fill="#9aab9a"/>
  <line x1="235" y1="65" x2="239" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 3: 鈍的剥離 -->
  <g transform="translate(250,10)">
    <rect width="105" height="110" rx="8" fill="#f4f5f4" stroke="#c8d0c8" stroke-width="1.5"/>
    <path d="M28,64 Q24,44 38,34 Q52,26 66,34 Q80,44 76,64 Q66,80 52,83 Q38,80 28,64Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <!-- blunt dissection with closed forceps -->
    <line x1="16" y1="44" x2="40" y2="52" stroke="#7a8898" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="48" x2="40" y2="54" stroke="#7a8898" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="8" y="41" width="10" height="9" rx="3" fill="#7a8898"/>
    <!-- separation gap -->
    <line x1="36" y1="48" x2="26" y2="56" stroke="#c8b890" stroke-width="2" stroke-linecap="round" stroke-dasharray="2,2"/>
    <circle cx="11" cy="11" r="9" fill="#5a6a78"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">3</text>
    <text x="52" y="101" text-anchor="middle" font-size="10" fill="#3d5042" font-weight="500">鈍的に剥離</text>
  </g>

  <!-- ARROW -->
  <polygon points="359,61 367,65 359,69" fill="#9aab9a"/>
  <line x1="355" y1="65" x2="359" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 4: エネルギーデバイスで切離 (ORANGE) -->
  <g transform="translate(370,10)">
    <rect width="105" height="110" rx="8" fill="#fef6ee" stroke="#e8c888" stroke-width="1.5"/>
    <path d="M28,64 Q24,44 38,34 Q52,26 66,34 Q80,44 76,64 Q66,80 52,83 Q38,80 28,64Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <!-- energy device at adhesion -->
    <line x1="16" y1="36" x2="36" y2="52" stroke="#d97a00" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="30" x2="42" y2="46" stroke="#d97a00" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="33" x2="28" y2="39" stroke="#d97a00" stroke-width="2.5" stroke-linecap="round"/>
    <!-- sparks -->
    <line x1="38" y1="46" x2="44" y2="40" stroke="#d97a00" stroke-width="1.5"/>
    <line x1="40" y1="50" x2="46" y2="46" stroke="#d97a00" stroke-width="1.5"/>
    <circle cx="11" cy="11" r="9" fill="#d97a00"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">4</text>
    <text x="52" y="101" text-anchor="middle" font-size="8.5" fill="#6b3d00" font-weight="500">エネルギーで切離</text>
  </g>

  <!-- ARROW -->
  <polygon points="479,61 487,65 479,69" fill="#9aab9a"/>
  <line x1="475" y1="65" x2="479" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 5: にじむ出血を圧迫 (GRAY/WHITE) -->
  <g transform="translate(490,10)">
    <rect width="105" height="110" rx="8" fill="#f4f5f4" stroke="#c8d0c8" stroke-width="1.5"/>
    <path d="M28,64 Q24,44 38,34 Q52,26 66,34 Q80,44 76,64 Q66,80 52,83 Q38,80 28,64Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <!-- gauze pressing on surface -->
    <rect x="14" y="40" width="30" height="22" rx="3" fill="white" stroke="#9090a0" stroke-width="1.5"/>
    <line x1="20" y1="48" x2="38" y2="48" stroke="#c8c8c8" stroke-width="1"/>
    <line x1="20" y1="54" x2="38" y2="54" stroke="#c8c8c8" stroke-width="1"/>
    <!-- pressing arrows -->
    <polygon points="24,38 32,38 28,40" fill="#9090a0"/>
    <circle cx="11" cy="11" r="9" fill="#7a8898"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">5</text>
    <text x="52" y="101" text-anchor="middle" font-size="9" fill="#3d5042" font-weight="500">出血を圧迫</text>
  </g>

  <!-- ARROW -->
  <polygon points="599,61 607,65 599,69" fill="#9aab9a"/>
  <line x1="595" y1="65" x2="599" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 6: 吸引で視野確保 (BLUE) -->
  <g transform="translate(610,10)">
    <rect width="105" height="110" rx="8" fill="#eef4fb" stroke="#b0c8e0" stroke-width="1.5"/>
    <path d="M28,64 Q24,44 38,34 Q52,26 66,34 Q80,44 76,64 Q66,80 52,83 Q38,80 28,64Z" fill="#fff0f0" stroke="#c87070" stroke-width="1.5"/>
    <rect x="20" y="20" width="8" height="46" rx="4" fill="#c8daf4" stroke="#1a5fa0" stroke-width="1.5"/>
    <line x1="24" y1="66" x2="38" y2="56" stroke="#1a5fa0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="38" cy="36" r="2" fill="#1a5fa0" opacity="0.4"/>
    <circle cx="42" cy="28" r="1.5" fill="#1a5fa0" opacity="0.3"/>
    <circle cx="11" cy="11" r="9" fill="#1a5fa0"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">6</text>
    <text x="52" y="101" text-anchor="middle" font-size="9.5" fill="#0c3d6e" font-weight="500">吸引で視野確保</text>
  </g>

  <!-- ARROW -->
  <polygon points="719,61 727,65 719,69" fill="#9aab9a"/>
  <line x1="715" y1="65" x2="719" y2="65" stroke="#9aab9a" stroke-width="2"/>

  <!-- FRAME 7: 次の剥離面へ進む -->
  <g transform="translate(730,10)">
    <rect width="105" height="110" rx="8" fill="#f0f7f2" stroke="#b8cfbb" stroke-width="1.5"/>
    <path d="M28,64 Q24,44 38,34 Q52,26 66,34 Q80,44 76,64 Q66,80 52,83 Q38,80 28,64Z" fill="#fff8f8" stroke="#c87070" stroke-width="1.5"/>
    <!-- cleared area with energy device ready -->
    <line x1="14" y1="52" x2="28" y2="52" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="16" y1="36" x2="32" y2="46" stroke="#d97a00" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="30" x2="38" y2="40" stroke="#d97a00" stroke-width="2.5" stroke-linecap="round"/>
    <!-- forward arrow -->
    <polygon points="62,52 72,48 72,56" fill="#1a7a4e"/>
    <line x1="52" y1="52" x2="62" y2="52" stroke="#1a7a4e" stroke-width="2"/>
    <circle cx="11" cy="11" r="9" fill="#1a7a4e"/>
    <text x="11" y="15" text-anchor="middle" font-size="10" fill="white" font-weight="bold">7</text>
    <text x="52" y="101" text-anchor="middle" font-size="9" fill="#0d5c3a" font-weight="500">次の剥離面へ</text>
  </g>
</svg>
