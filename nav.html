<script>
(function() {
  // 現在のパスに応じてactiveクラスを付与
  var path = window.location.pathname;
  var map = {
    'nav-driver-pos':  ['driver-positive.html'],
    'nav-egfr':        ['egfr-firstline.html'],
    'nav-driver-neg':  ['index.html'],
    'nav-about':       ['about.html', 'about-en.html'],
  };
  Object.keys(map).forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    map[id].forEach(function(p) {
      if (path.indexOf(p) !== -1) el.classList.add('active');
    });
  });
  // 化学療法ドロップダウンのparent active
  var chemoPages = ['driver-positive', 'egfr-firstline', 'index.html', 'sclc', 'resistance'];
  if (chemoPages.some(function(p){ return path.indexOf(p) !== -1; })) {
    var chemoLink = document.getElementById('nav-chemo');
    if (chemoLink) chemoLink.classList.add('active');
  }
})();
</script>
